<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>親子で学習！クイズアプリ</title>
    <style>
      body {
        font-family: "Helvetica Neue", Arial, sans-serif;
        padding: 20px;
        background: #f0f4f8;
        color: #333;
      }
      .container {
        max-width: 600px;
        margin: 0 auto;
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      /* モード切り替えボタン */
      .mode-switcher {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      .mode-btn {
        flex: 1;
        padding: 10px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        background: #ddd;
      }
      .mode-btn.active {
        background: #2196f3;
        color: white;
      }

      /* 共通設定 */
      .hidden {
        display: none;
      }
      h2 {
        border-bottom: 2px solid #eee;
        padding-bottom: 10px;
      }
      .form-group {
        margin-bottom: 15px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input {
        width: 100%;
        padding: 12px;
        box-sizing: border-box;
        border: 2px solid #ddd;
        border-radius: 8px;
        font-size: 16px;
      }

      /* 子供モードのスタイル */
      .child-card {
        text-align: center;
        padding: 20px;
        border-radius: 15px;
        border: 4px solid #eee;
        margin-top: 20px;
      }
      .question-text {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 20px;
      }
      .hint-text {
        color: #f44336;
        font-weight: bold;
        margin: 10px 0;
        min-height: 1.2em;
      }
      .btn-action {
        width: 100%;
        padding: 15px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        font-size: 18px;
        font-weight: bold;
        margin-top: 10px;
      }
      .btn-check {
        background: #ff9800;
        color: white;
      }
      .btn-hint {
        background: #eee;
        color: #666;
        font-size: 14px;
      }

      /* 成績・累計 */
      .score-board {
        background: #e3f2fd;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
      }

      /* 親モード用（前回分） */
      .quiz-item {
        background: #fafafa;
        padding: 15px;
        margin-bottom: 10px;
        border-left: 8px solid #ccc;
        position: relative;
        border-radius: 4px;
      }
      .btn-save {
        background: #4caf50;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 5px;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="mode-switcher">
        <button
          id="btnParent"
          class="mode-btn active"
          onclick="switchMode('parent')"
        >
          親モード (作る)
        </button>
        <button id="btnChild" class="mode-btn" onclick="switchMode('child')">
          子供モード (解く)
        </button>
      </div>

      <div class="score-board">
        <span>累計ポイント: <strong id="totalPoints">0</strong> pt</span>
      </div>

      <div id="parentMode">
        <h2>📝 問題を作る</h2>
        <div class="form-group">
          <label>色タグ</label>
          <select id="category" style="width: 100%; padding: 10px">
            <option value="#2196F3">青色</option>
            <option value="#F44336">赤色</option>
            <option value="#4CAF50">緑色</option>
            <option value="#FFC107">黄色</option>
            <option value="#9C27B0">紫色</option>
          </select>
        </div>
        <div class="form-group">
          <label>問題文</label>
          <input type="text" id="question" placeholder="例：8 × 7 は？" />
        </div>
        <div class="form-group">
          <label>答え</label>
          <input type="text" id="answer" placeholder="例：56" />
        </div>
        <div class="form-group">
          <label>ヒント（最初の一文字）</label>
          <input type="text" id="hint" placeholder="例：ご" />
        </div>
        <button class="btn-save" onclick="saveQuiz()">保存する</button>
        <div id="quizList" style="margin-top: 20px"></div>
      </div>

      <div
        style="
          margin-top: 20px;
          padding: 15px;
          background: #fff3e0;
          border-radius: 8px;
        "
      >
        <p style="margin-top: 0; font-weight: bold">データの共有</p>
        <div style="display: flex; gap: 10px">
          <button
            onclick="exportJSON()"
            style="flex: 1; padding: 10px; cursor: pointer"
          >
            📤 ファイルに書き出す
          </button>

          <label
            style="
              flex: 1;
              padding: 10px;
              background: #eee;
              text-align: center;
              cursor: pointer;
              border-radius: 2px;
              border: 1px solid #ccc;
              font-size: 13px;
            "
          >
            📥 ファイルから読み込む
            <input
              type="file"
              id="importFile"
              accept=".json"
              onchange="importJSON(event)"
              style="display: none"
            />
          </label>
        </div>
        <p style="font-size: 11px; color: #666; margin-bottom: 0">
          ※読み込むと、今ある問題に新しく追加されます。
        </p>
      </div>

      <div id="childMode" class="hidden">
        <h2>🚀 クイズにちょうせん！</h2>
        <div id="quizArea">
          <div id="childCard" class="child-card">
            <div
              id="qCategory"
              style="margin-bottom: 10px; font-weight: bold"
            ></div>
            <div class="question-text" id="displayQuestion">
              問題が読み込めないよ
            </div>
            <input
              type="text"
              id="childAnswer"
              placeholder="こたえを入力してね"
            />
            <div id="displayHint" class="hint-text"></div>

            <button class="btn-action btn-check" onclick="checkAnswer()">
              こたえあわせ！
            </button>
            <button
              class="btn-action btn-hint"
              id="hintBtn"
              onclick="showHint()"
            >
              ヒントをみる (もらえるポイントがへるよ)
            </button>
          </div>
          <p id="progress" style="text-align: center; color: #666"></p>
        </div>
        <div id="resultArea" class="hidden" style="text-align: center">
          <h3>おつかれさま！</h3>
          <p style="font-size: 20px">
            今回のポイント: <span id="sessionScore">0</span> pt
          </p>
          <p
            id="parentMessage"
            style="font-weight: bold; color: #2196f3; font-size: 24px"
          ></p>
          <button class="btn-action btn-check" onclick="switchMode('child')">
            もういちど遊ぶ
          </button>
        </div>
      </div>
    </div>

<script>
    let quizzes = [];
    let currentQuizIndex = 0;
    let sessionScore = 0;
    let usedHint = false;

    window.onload = () => {
        loadData();
        displayQuizzes();
        updatePointDisplay();
    };

    function loadData() {
        quizzes = JSON.parse(localStorage.getItem('myQuizzes')) || [];
    }

    function updatePointDisplay() {
        const total = localStorage.getItem('totalPoints') || 0;
        document.getElementById('totalPoints').innerText = total;
    }

    // --- モード切り替え ---
    function switchMode(mode) {
        if(mode === 'parent') {
            document.getElementById('parentMode').classList.remove('hidden');
            document.getElementById('childMode').classList.add('hidden');
            document.getElementById('btnParent').classList.add('active');
            document.getElementById('btnChild').classList.remove('active');
            displayQuizzes();
        } else {
            if(quizzes.length === 0) return alert("まずは親モードで問題を作ってね！");
            document.getElementById('parentMode').classList.add('hidden');
            document.getElementById('childMode').classList.remove('hidden');
            document.getElementById('btnParent').classList.remove('active');
            document.getElementById('btnChild').classList.add('active');
            startQuiz();
        }
    }

    // --- 親モード：保存 ---
    function saveQuiz() {
        const q = document.getElementById('question').value;
        const a = document.getElementById('answer').value;
        const h = document.getElementById('hint').value;
        const c = document.getElementById('category').value;

        if(!q || !a) return alert("問題と答えを入れてね");

        quizzes.push({ id: Date.now(), question: q, answer: a, hint: h, category: c, score: 0 });
        localStorage.setItem('myQuizzes', JSON.stringify(quizzes));
        
        document.getElementById('question').value = "";
        document.getElementById('answer').value = "";
        document.getElementById('hint').value = "";
        displayQuizzes();
    }

    function displayQuizzes() {
        const list = document.getElementById('quizList');
        list.innerHTML = "<h3>作った問題</h3>";
        quizzes.forEach(item => {
            const div = document.createElement('div');
            div.className = 'quiz-item';
            div.style.borderLeftColor = item.category;
            div.innerHTML = `<strong>${item.question}</strong><br><small>答: ${item.answer}</small>`;
            list.appendChild(div);
        });
    }

    // --- 子供モード：クイズ開始 ---
    function startQuiz() {
        currentQuizIndex = 0;
        sessionScore = 0;
        document.getElementById('quizArea').classList.remove('hidden');
        document.getElementById('resultArea').classList.add('hidden');
        quizzes.sort(() => Math.random() - 0.5);
        showQuestion();
    }

    function showQuestion() {
        const q = quizzes[currentQuizIndex];
        usedHint = false;
        document.getElementById('displayQuestion').innerText = q.question;
        document.getElementById('displayHint').innerText = "";
        document.getElementById('childAnswer').value = "";
        document.getElementById('childCard').style.borderColor = q.category;
        document.getElementById('qCategory').innerText = "この問題の色タグ：●";
        document.getElementById('qCategory').style.color = q.category;
        document.getElementById('progress').innerText = `${currentQuizIndex + 1} / ${quizzes.length} 問目`;
        document.getElementById('hintBtn').classList.remove('hidden');
    }

    function showHint() {
        const q = quizzes[currentQuizIndex];
        document.getElementById('displayHint').innerText = `ヒント：さいしょの文字は 「${q.hint}」 だよ！`;
        usedHint = true;
        document.getElementById('hintBtn').classList.add('hidden');
    }

    function checkAnswer() {
        const userAnswer = document.getElementById('childAnswer').value.trim();
        const correctAnswer = quizzes[currentQuizIndex].answer.trim();

        if(userAnswer === correctAnswer) {
            const points = usedHint ? 3 : 10;
            sessionScore += points;
            alert(`正解！ +${points}pt ゲット！`);
            
            currentQuizIndex++;
            if(currentQuizIndex < quizzes.length) {
                showQuestion();
            } else {
                finishQuiz();
            }
        } else {
            alert("ざんねん！ちがうよ。もういちど考えてみて！");
        }
    }

    function finishQuiz() {
        document.getElementById('quizArea').classList.add('hidden');
        document.getElementById('resultArea').classList.remove('hidden');
        document.getElementById('sessionScore').innerText = sessionScore;

        let total = parseInt(localStorage.getItem('totalPoints') || 0);
        total += sessionScore;
        localStorage.setItem('totalPoints', total);
        updatePointDisplay();

        let msg = "よくがんばったね！";
        if(sessionScore >= quizzes.length * 8) msg = "しんじられない！てんさいだ！";
        document.getElementById('parentMessage').innerText = msg;
    } // ← ここで finishQuiz をしっかり閉じます！

    // --- データの書き出し (独立した関数) ---
    function exportJSON() {
        if (quizzes.length === 0) return alert("書き出す問題がありません。");
        const dataStr = JSON.stringify(quizzes, null, 2);
        const blob = new Blob([dataStr], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "quiz_data.json";
        a.click();
        URL.revokeObjectURL(url);
    }

    // --- データの読み込み (独立した関数) ---
    function importJSON(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const importedData = JSON.parse(e.target.result);
                if (Array.isArray(importedData)) {
                    quizzes = quizzes.concat(importedData);
                    localStorage.setItem('myQuizzes', JSON.stringify(quizzes));
                    displayQuizzes();
                    alert(importedData.length + " 問の問題を読み込みました！");
                } else {
                    alert("形式が正しくありません。");
                }
            } catch (err) {
                alert("読み込みに失敗しました。");
            }
        };
        reader.readAsText(file);
    }
</script>

  </body>
</html>
